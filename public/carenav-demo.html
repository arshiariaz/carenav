<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareNav Health - Healthcare Navigation Platform</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .animate-fadeIn { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
        .transform { transform: translateZ(0); }
        @keyframes spin { to { transform: rotate(360deg); } }
        .animate-spin { animation: spin 1s linear infinite; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #888; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useCallback, useEffect, useRef } = React;

        // ── Urgency helper ────────────────────────────────────────────────────
        function urgencyInfo(urgency, copays) {
            const cost  = { emergency: copays ? `$${copays.emergency} ER copay` : 'Go to ER immediately', urgent: copays ? `$${copays.urgentCare} urgent care copay` : '$75–150', routine: copays ? `$${copays.primaryCare} PCP copay` : '$30–60', self_care: 'Free – manage at home' };
            const label = { emergency: 'Emergency Care Recommended', urgent: 'Urgent Care Recommended', routine: 'Primary Care Recommended', self_care: 'Self-Care Likely Sufficient' };
            const color = { emergency: 'from-red-50 to-rose-50 border-red-200', urgent: 'from-orange-50 to-amber-50 border-orange-200', routine: 'from-blue-50 to-sky-50 border-blue-200', self_care: 'from-green-50 to-emerald-50 border-green-200' };
            const icon  = { emergency: '🚨', urgent: '⚠️', routine: 'ℹ️', self_care: '✅' };
            return { cost: cost[urgency] || '$75–150', label: label[urgency] || 'Care Recommended', color: color[urgency] || 'from-orange-50 to-amber-50 border-orange-200', icon: icon[urgency] || '⚠️' };
        }

        // ── Main component ────────────────────────────────────────────────────
        function CareNavComplete() {
            const [currentPage,     setCurrentPage]     = useState('home');
            const [insuranceData,   setInsuranceData]   = useState(null);
            const [matchedPlan,     setMatchedPlan]     = useState(null);
            const [symptomData,     setSymptomData]     = useState(null);
            const [isUploading,     setIsUploading]     = useState(false);
            const [uploadError,     setUploadError]     = useState('');
            const [uploadProgress,  setUploadProgress]  = useState('');
            const [showManualEntry, setShowManualEntry] = useState(false);
            const fileInputRef = useRef(null);
            const [userLocation]  = useState({ city: 'Houston', state: 'TX', zip: '77001' });

            useEffect(() => { lucide.createIcons(); });

            // ── OCR upload ────────────────────────────────────────────────────
            const handleFileChange = async (e) => {
                const file = e.target.files && e.target.files[0];
                if (!file) return;
                setIsUploading(true); setUploadError(''); setUploadProgress('Uploading insurance card...');
                const fd = new FormData();
                fd.append('file', file);
                try {
                    const t = setTimeout(() => setUploadProgress('Analyzing card details...'), 1800);
                    const res = await fetch('/api/ocr', { method: 'POST', body: fd });
                    clearTimeout(t);
                    const data = await res.json();
                    if (data.error) { setUploadError(data.error); }
                    else { setInsuranceData(data.extracted); setMatchedPlan(data.matchedPlan); setUploadProgress('✓ Card processed!'); setTimeout(() => setUploadProgress(''), 2000); }
                } catch { setUploadError('Upload failed. Make sure the dev server is running at localhost:3000.'); }
                finally { setIsUploading(false); if (fileInputRef.current) fileInputRef.current.value = ''; }
            };

            // ── Manual plan entry ─────────────────────────────────────────────
            const handleManualSubmit = async (fields) => {
                setIsUploading(true); setUploadError(''); setUploadProgress('Looking up your plan...');
                try {
                    const res = await fetch('/api/match-plan', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(fields) });
                    const data = await res.json();
                    if (data.error) { setUploadError(data.error); }
                    else { setInsuranceData({ companyName: fields.companyName, memberId: fields.memberId, groupNumber: fields.groupNumber, payerId: fields.payerId }); setMatchedPlan(data.plan || data.matchedPlan); setShowManualEntry(false); }
                } catch { setUploadError('Plan lookup failed. Try again.'); }
                finally { setIsUploading(false); setUploadProgress(''); }
            };

            // ── Navigation ────────────────────────────────────────────────────
            const NavigationBar = () => (
                <header className="bg-white/80 backdrop-blur-md shadow-sm sticky top-0 z-50 border-b border-gray-100">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="flex items-center justify-between h-16">
                            <div className="flex items-center gap-6">
                                <div className="flex items-center gap-2 cursor-pointer" onClick={() => setCurrentPage('home')}>
                                    <div className="w-8 h-8 bg-gradient-to-br from-blue-500 to-purple-600 rounded-lg flex items-center justify-center"><i data-lucide="heart" className="w-5 h-5 text-white"></i></div>
                                    <span className="text-xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">CareNav</span>
                                </div>
                                <nav className="hidden md:flex items-center gap-6">
                                    <button onClick={() => setCurrentPage('home')} className={`text-sm font-medium transition-colors ${currentPage === 'home' ? 'text-blue-600' : 'text-gray-600 hover:text-gray-900'}`}>Find Care</button>
                                    {insuranceData && (
                                        <button onClick={() => setCurrentPage('benefits')} className={`text-sm font-medium transition-colors flex items-center gap-1 ${currentPage === 'benefits' ? 'text-blue-600' : 'text-gray-600 hover:text-gray-900'}`}>
                                            My Benefits<span className="ml-1 px-2 py-0.5 bg-green-100 text-green-700 text-xs rounded-full">Active</span>
                                        </button>
                                    )}
                                    <button className="text-sm font-medium text-gray-600 hover:text-gray-900 transition-colors">Claims</button>
                                    <button className="text-sm font-medium text-gray-600 hover:text-gray-900 transition-colors">Help</button>
                                </nav>
                            </div>
                            <div className="flex items-center gap-4">
                                {insuranceData && (
                                    <div className="hidden md:flex items-center gap-3 px-4 py-2 bg-gray-50 rounded-lg">
                                        <i data-lucide="shield" className="w-4 h-4 text-gray-600"></i>
                                        <div className="text-right"><p className="text-xs text-gray-500">Your Plan</p><p className="text-sm font-medium text-gray-900">{matchedPlan && matchedPlan.name}</p></div>
                                    </div>
                                )}
                                <button className="md:hidden p-2"><i data-lucide="menu" className="w-5 h-5 text-gray-600"></i></button>
                            </div>
                        </div>
                    </div>
                </header>
            );

            // ── Manual entry modal ────────────────────────────────────────────
            const ManualEntryModal = () => {
                const [f, setF] = useState({ companyName: '', memberId: '', groupNumber: '', payerId: '' });
                return (
                    <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
                        <div className="bg-white rounded-2xl max-w-md w-full p-6">
                            <div className="flex items-center justify-between mb-6">
                                <h2 className="text-xl font-bold text-gray-900">Enter Insurance Details</h2>
                                <button onClick={() => setShowManualEntry(false)}><i data-lucide="x" className="w-6 h-6 text-gray-500"></i></button>
                            </div>
                            <div className="space-y-4">
                                {[['Insurance Company *','companyName','e.g. Anthem, UnitedHealthcare'],['Member ID *','memberId','Found on front of your card'],['Group Number','groupNumber','Optional'],['Payer ID','payerId','Optional – back of card']].map(([label,key,ph]) => (
                                    <div key={key}>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">{label}</label>
                                        <input type="text" placeholder={ph} value={f[key]} onChange={e => setF(prev => ({ ...prev, [key]: e.target.value }))} className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 text-sm" />
                                    </div>
                                ))}
                                {uploadError && <p className="text-sm text-red-600 bg-red-50 p-3 rounded-lg">{uploadError}</p>}
                                <button onClick={() => handleManualSubmit(f)} disabled={isUploading || !f.companyName || !f.memberId} className="w-full py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:opacity-50 font-medium flex items-center justify-center gap-2">
                                    {isUploading ? <><div className="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div>{uploadProgress || 'Looking up...'}</> : 'Find My Plan'}
                                </button>
                            </div>
                        </div>
                    </div>
                );
            };

            // ── Home page ─────────────────────────────────────────────────────
            const HomePage = () => {
                const [symptom,          setSymptom]          = useState('');
                const [showProviders,    setShowProviders]    = useState(false);
                const [providerFilter,   setProviderFilter]   = useState('all');
                const [apiProviders,     setApiProviders]     = useState([]);
                const [loadingProviders, setLoadingProviders] = useState(false);
                const [providerError,    setProviderError]    = useState('');
                const [analyzing,        setAnalyzing]        = useState(false);
                const [symptomError,     setSymptomError]     = useState('');

                const fetchProviders = async (symptomText, analysis) => {
                    setLoadingProviders(true); setProviderError(''); setApiProviders([]);
                    let cptCodes = ['99213'], urgency = 'routine';
                    if (analysis && analysis.cptCodes && analysis.cptCodes.length) {
                        cptCodes = analysis.cptCodes.map(c => c.code); urgency = analysis.urgency;
                    } else {
                        const s = (symptomText || '').toLowerCase();
                        if (s.includes('flu')) cptCodes = ['99213','87804'];
                        else if (s.includes('throat') || s.includes('strep')) cptCodes = ['99213','87880'];
                        else if (s.includes('chest') || s.includes('heart')) { cptCodes = ['99284','71045']; urgency = 'emergency'; }
                        else if (s.includes('sprain') || s.includes('ankle')) cptCodes = ['99213','73610'];
                    }
                    try {
                        const res = await fetch('/api/provider-costs-local', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ planId: matchedPlan ? matchedPlan.id : 'unknown', symptom: symptomText, cptCodes, urgency, city: userLocation.city, state: userLocation.state, zip: userLocation.zip, insuranceCompany: insuranceData ? insuranceData.companyName : '' }) });
                        if (!res.ok) throw new Error('API ' + res.status);
                        const data = await res.json();
                        if (data.success && Array.isArray(data.providers) && data.providers.length > 0) {
                            setApiProviders(data.providers.map(p => ({ name: p.name || 'Unknown Provider', type: p.type || 'Clinic', address: p.address || '', phone: p.phone || '', distance: typeof p.distance === 'number' ? p.distance : 0, waitTime: p.waitTime || 'Call ahead', hours: p.hours || 'Call for hours', estimatedPatientCost: p.estimatedPatientCost != null ? p.estimatedPatientCost : 75, negotiatedRate: p.negotiatedRate != null ? p.negotiatedRate : 200, insurancePays: p.insurancePays != null ? p.insurancePays : 0, networkStatus: p.networkStatus || 'In-Network', rating: p.rating || null, dataSource: p.dataSource || '' })));
                        } else {
                            setProviderError(data.error || 'No providers found near ' + userLocation.city + '.');
                        }
                    } catch { setProviderError('Could not load providers. Make sure npm run dev is running.'); }
                    finally { setLoadingProviders(false); }
                };

                const handleSymptomSubmit = async (symptomText) => {
                    if (!symptomText || !symptomText.trim()) return;
                    setSymptom(symptomText); setAnalyzing(true); setSymptomError(''); setShowProviders(false);
                    try {
                        const res = await fetch('/api/symptom-triage', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ symptom: symptomText }) });
                        const data = await res.json();
                        if (data.success && data.analysis) {
                            const a = data.analysis;
                            const rec = urgencyInfo(a.urgency, matchedPlan ? matchedPlan.copays : null);
                            setSymptomData({ symptom: symptomText, urgency: a.urgency, recommendedCare: (a.careSettings && a.careSettings[0]) || rec.label, estimatedCost: rec.cost, cptCodes: a.cptCodes || [], reasoning: a.reasoning, redFlags: a.redFlags });
                            setShowProviders(true);
                            await fetchProviders(symptomText, a);
                        } else {
                            setSymptomError('Symptom analysis unavailable – showing nearby providers.');
                            setSymptomData({ symptom: symptomText, urgency: 'routine', recommendedCare: 'Urgent Care', estimatedCost: '$75–150', cptCodes: [] });
                            setShowProviders(true);
                            await fetchProviders(symptomText, null);
                        }
                    } catch {
                        setSymptomError('Analysis failed. Showing nearby providers anyway.');
                        setSymptomData({ symptom: symptomText, urgency: 'routine', recommendedCare: 'Urgent Care', estimatedCost: '$75–150', cptCodes: [] });
                        setShowProviders(true);
                        await fetchProviders(symptomText, null);
                    } finally { setAnalyzing(false); }
                };

                const filteredProviders = providerFilter === 'all' ? apiProviders : apiProviders.filter(p => {
                    if (providerFilter === 'Urgent Care') return p.type === 'Urgent Care' || (p.name || '').toLowerCase().includes('urgent');
                    if (providerFilter === 'Emergency Room') return p.type === 'Emergency Room' || p.type === 'Hospital';
                    return p.type === 'Primary Care' || p.type === 'Clinic';
                });
                const triage = symptomData ? urgencyInfo(symptomData.urgency, matchedPlan ? matchedPlan.copays : null) : null;

                return (
                    <div className="min-h-screen bg-gradient-to-br from-blue-50 via-white to-purple-50">
                        <section className="pt-16 pb-8 px-4 sm:px-6 lg:px-8">
                            <div className="max-w-7xl mx-auto">

                                {insuranceData && (
                                    <div className="mb-8 p-6 bg-white rounded-xl shadow-md">
                                        <div className="flex items-center justify-between">
                                            <div>
                                                <h2 className="text-xl font-semibold text-gray-900 mb-1">Welcome back!</h2>
                                                <p className="text-gray-600">You're covered by {insuranceData.companyName} {matchedPlan && matchedPlan.name}</p>
                                            </div>
                                            <button onClick={() => setCurrentPage('benefits')} className="flex items-center gap-2 text-blue-600 hover:text-blue-700 font-medium">
                                                View Full Benefits <i data-lucide="arrow-right" className="w-4 h-4"></i>
                                            </button>
                                        </div>
                                        <div className="grid grid-cols-3 gap-4 mt-6">
                                            <div className="text-center"><p className="text-2xl font-bold text-gray-900">${matchedPlan ? matchedPlan.deductible - 450 : '–'}</p><p className="text-sm text-gray-600">Deductible remaining</p></div>
                                            <div className="text-center"><p className="text-2xl font-bold text-green-600">${matchedPlan ? matchedPlan.copays.primaryCare : '–'}</p><p className="text-sm text-gray-600">PCP copay</p></div>
                                            <div className="text-center"><p className="text-2xl font-bold text-blue-600">${matchedPlan ? matchedPlan.copays.urgentCare : '–'}</p><p className="text-sm text-gray-600">Urgent care copay</p></div>
                                        </div>
                                    </div>
                                )}

                                <div className="text-center mb-12">
                                    <h1 className="text-4xl sm:text-5xl font-bold text-gray-900 mb-4">
                                        {insuranceData ? 'How can we help today?' : 'Healthcare costs, '}
                                        {!insuranceData && <span className="bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">simplified</span>}
                                    </h1>
                                    <p className="text-xl text-gray-600 max-w-2xl mx-auto">
                                        {insuranceData ? `Find the right care at the right price with your ${insuranceData.companyName} coverage` : "Know what you'll pay before you go. Upload your insurance card and find affordable care."}
                                    </p>
                                </div>

                                {!insuranceData ? (
                                    <div className="max-w-2xl mx-auto bg-white rounded-2xl shadow-xl p-8">
                                        <div className="text-center mb-6">
                                            <div className="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4"><i data-lucide="shield" className="w-8 h-8 text-blue-600"></i></div>
                                            <h2 className="text-2xl font-bold text-gray-900 mb-2">Let's start with your insurance</h2>
                                            <p className="text-gray-600">Upload a photo of your insurance card to see your benefits</p>
                                        </div>

                                        <input ref={fileInputRef} type="file" accept="image/*" style={{display:'none'}} onChange={handleFileChange} />

                                        <div onClick={() => !isUploading && fileInputRef.current && fileInputRef.current.click()} className={`border-2 border-dashed border-gray-300 rounded-xl p-12 text-center cursor-pointer hover:border-blue-500 hover:bg-blue-50 transition-all duration-200 group ${isUploading ? 'pointer-events-none' : ''}`}>
                                            {isUploading ? (
                                                <><div className="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div><p className="text-lg font-medium text-gray-700">{uploadProgress || 'Processing...'}</p><p className="text-sm text-gray-500 mt-2">This will just take a moment</p></>
                                            ) : (
                                                <><i data-lucide="upload" className="w-12 h-12 text-gray-400 mx-auto mb-4 group-hover:text-blue-500 transition-colors"></i><p className="text-lg font-medium text-gray-700 mb-2">Drop your insurance card here</p><p className="text-sm text-gray-500">or click to browse · JPG, PNG</p></>
                                            )}
                                        </div>

                                        {uploadError && <div className="mt-4 p-3 bg-red-50 border border-red-200 rounded-lg"><p className="text-sm text-red-700">{uploadError}</p></div>}

                                        <div className="mt-6 text-center">
                                            <p className="text-xs text-gray-500 mb-2">Don't have your card handy?</p>
                                            <button onClick={() => setShowManualEntry(true)} className="text-blue-600 hover:text-blue-700 text-sm font-medium">Enter information manually →</button>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="max-w-2xl mx-auto">
                                        <div className="bg-white rounded-2xl shadow-xl p-8">
                                            <div className="text-center mb-6">
                                                <div className="w-16 h-16 bg-purple-100 rounded-full flex items-center justify-center mx-auto mb-4">
                                                    {analyzing ? <div className="w-8 h-8 border-4 border-purple-600 border-t-transparent rounded-full animate-spin"></div> : <i data-lucide="activity" className="w-8 h-8 text-purple-600"></i>}
                                                </div>
                                                <h2 className="text-2xl font-bold text-gray-900 mb-2">What brings you in today?</h2>
                                                <p className="text-gray-600">Describe your symptoms and we'll find the right care</p>
                                            </div>
                                            <div className="space-y-4">
                                                <div className="relative">
                                                    <input type="text" placeholder="e.g., sore throat and fever for 2 days" value={symptom} onChange={e => setSymptom(e.target.value)} disabled={analyzing} className="w-full px-4 py-3 pr-12 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 transition-all disabled:opacity-50" onKeyPress={e => { if (e.key === 'Enter' && e.target.value) handleSymptomSubmit(e.target.value); }} />
                                                    <i data-lucide="sparkles" className="absolute right-4 top-3.5 w-5 h-5 text-gray-400"></i>
                                                </div>
                                                {symptomError && <p className="text-sm text-amber-700 bg-amber-50 p-3 rounded-lg">{symptomError}</p>}
                                                <div className="flex flex-wrap gap-2">
                                                    <span className="text-sm text-gray-500">Common symptoms:</span>
                                                    {['Flu symptoms','Sore throat','Sprained ankle','Chest pain'].map(s => (
                                                        <button key={s} onClick={() => handleSymptomSubmit(s)} disabled={analyzing} className="px-3 py-1 bg-gray-100 hover:bg-gray-200 rounded-full text-sm text-gray-700 transition-colors disabled:opacity-50">{s}</button>
                                                    ))}
                                                </div>
                                                {analyzing && (
                                                    <div className="flex items-center gap-3 p-4 bg-purple-50 rounded-lg">
                                                        <div className="w-5 h-5 border-2 border-purple-600 border-t-transparent rounded-full animate-spin flex-shrink-0"></div>
                                                        <div><p className="text-sm font-medium text-purple-900">Analyzing your symptoms...</p><p className="text-xs text-purple-700 mt-0.5">GPT-4 is reviewing urgency and CPT codes</p></div>
                                                    </div>
                                                )}
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-2 gap-4 mt-6">
                                            <button onClick={() => setCurrentPage('benefits')} className="p-6 bg-white rounded-xl shadow-md hover:shadow-lg transition-all text-left group">
                                                <i data-lucide="credit-card" className="w-8 h-8 text-blue-600 mb-3"></i>
                                                <h3 className="font-semibold text-gray-900 mb-1">Check Coverage</h3>
                                                <p className="text-sm text-gray-600">See what's covered by your plan</p>
                                            </button>
                                            <button onClick={() => handleSymptomSubmit(symptom || 'office visit')} className="p-6 bg-white rounded-xl shadow-md hover:shadow-lg transition-all text-left group">
                                                <i data-lucide="map-pin" className="w-8 h-8 text-purple-600 mb-3"></i>
                                                <h3 className="font-semibold text-gray-900 mb-1">Find Providers</h3>
                                                <p className="text-sm text-gray-600">Browse in-network doctors</p>
                                            </button>
                                        </div>
                                    </div>
                                )}

                                {symptomData && showProviders && (
                                    <div className="mt-8 space-y-6 animate-fadeIn">
                                        <div className={`bg-gradient-to-r ${triage ? triage.color : 'from-orange-50 to-amber-50 border-orange-200'} border rounded-xl p-6`}>
                                            <div className="flex items-start gap-4">
                                                <span className="text-2xl flex-shrink-0">{triage ? triage.icon : '⚠️'}</span>
                                                <div className="flex-1">
                                                    <h3 className="font-semibold text-gray-900 mb-1">{triage ? triage.label : 'Care Recommended'}</h3>
                                                    <p className="text-sm text-gray-700 mb-1">{symptomData.reasoning || `Based on your symptoms, ${symptomData.recommendedCare} is recommended.`}</p>
                                                    <p className="text-sm font-medium text-gray-900">Estimated cost with your plan: {symptomData.estimatedCost}</p>
                                                    {symptomData.redFlags && symptomData.redFlags.length > 0 && (
                                                        <div className="mt-3 p-3 bg-white/60 rounded-lg">
                                                            <p className="text-xs font-semibold text-red-700 mb-1">🚩 Seek immediate care if you experience:</p>
                                                            <ul className="text-xs text-gray-700 space-y-0.5">{symptomData.redFlags.map((f, i) => <li key={i}>• {f}</li>)}</ul>
                                                        </div>
                                                    )}
                                                    <button onClick={() => setCurrentPage('benefits')} className="text-sm text-blue-600 hover:text-blue-700 font-medium mt-3 block">Check full coverage details →</button>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="bg-white rounded-xl shadow-lg p-6">
                                            <div className="flex items-center justify-between mb-4">
                                                <h3 className="text-lg font-semibold text-gray-900">Nearby Providers {apiProviders.length > 0 && <span className="ml-2 text-sm text-gray-500 font-normal">({apiProviders.length} found)</span>}</h3>
                                                <div className="flex items-center gap-2">
                                                    <i data-lucide="filter" className="w-4 h-4 text-gray-500"></i>
                                                    <select value={providerFilter} onChange={e => setProviderFilter(e.target.value)} className="text-sm border border-gray-300 rounded-md px-3 py-1 focus:ring-2 focus:ring-blue-500">
                                                        <option value="all">All Providers</option>
                                                        <option value="Urgent Care">Urgent Care</option>
                                                        <option value="Emergency Room">Emergency Room</option>
                                                        <option value="Primary Care">Primary Care</option>
                                                    </select>

                                                        <div className="flex items-center justify-between mb-2"><h3 className="font-semibold text-gray-900">{tier.tier}</h3><p className="text-xl font-bold text-gray-900">{tier.cost || `${tier.percentage} coinsurance`}</p></div>
                                                        <p className="text-sm text-gray-600 mb-2">Common medications:</p>
                                                        <div className="flex flex-wrap gap-2">{tier.examples.map((med, i) => <span key={i} className="px-2 py-1 bg-gray-100 rounded text-sm text-gray-700">{med}</span>)}</div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {activeTab === 'preventive' && (
                                    <div className="space-y-6">
                                        <div className="bg-white rounded-xl shadow-lg p-6">
                                            <h2 className="text-xl font-bold text-gray-900 mb-2">100% Covered Preventive Care</h2>
                                            <p className="text-gray-600 mb-6">These services are free when you use in-network providers. No copay, no deductible.</p>
                                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                                {[{title:'Adults',icon:'users',items:preventiveCare.adults},{title:'Children',icon:'baby',items:preventiveCare.children},{title:'Women',icon:'heart',items:preventiveCare.women}].map(group => (
                                                    <div key={group.title}>
                                                        <h3 className="font-semibold text-gray-900 mb-3 flex items-center gap-2"><i data-lucide={group.icon} className="w-5 h-5 text-blue-600"></i>{group.title}</h3>
                                                        <ul className="space-y-2">
                                                            {group.items.map((item, index) => (
                                                                <li key={index} className="flex items-start gap-2 cursor-pointer hover:bg-gray-50 -mx-2 px-2 py-1 rounded transition-colors" onClick={() => handleServiceClick({ service: item, cost: '$0', status: '100% covered', preventive: true })}>
                                                                    <i data-lucide="check-circle" className="w-4 h-4 text-green-500 flex-shrink-0 mt-0.5"></i>
                                                                    <span className="text-sm text-gray-700 flex-1">{item}</span>
                                                                    <i data-lucide="chevron-right" className="w-4 h-4 text-gray-400"></i>
                                                                </li>
                                                            ))}
                                                        </ul>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </section>

                        {showBookingModal && (
                            <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
                                <div className="bg-white rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-hidden">
                                    <div className="bg-gradient-to-r from-blue-600 to-purple-600 p-6 text-white">
                                        <div className="flex items-center justify-between">
                                            <div><h2 className="text-2xl font-bold">Book {selectedService && selectedService.service}</h2><p className="text-blue-100 mt-1">Estimated cost: {selectedService && selectedService.cost} {selectedService && selectedService.preventive && '(Free - Preventive Care)'}</p></div>
                                            <button onClick={() => setShowBookingModal(false)} className="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center hover:bg-white/30 transition-colors"><i data-lucide="x" className="w-6 h-6"></i></button>
                                        </div>
                                    </div>
                                    <div className="p-6 overflow-y-auto max-h-[calc(90vh-120px)]">
                                        {bookingStep === 'select' && (
                                            <div>
                                                <h3 className="font-semibold text-gray-900 mb-4">How would you like to receive care?</h3>
                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                    <button onClick={() => setBookingStep('providers')} className="p-6 border-2 border-gray-200 rounded-xl hover:border-blue-500 hover:bg-blue-50 transition-all text-left">
                                                        <div className="flex items-start justify-between mb-3"><i data-lucide="stethoscope" className="w-8 h-8 text-blue-600"></i><span className="text-2xl font-bold text-gray-900">{selectedService && selectedService.cost}</span></div>
                                                        <h4 className="font-semibold text-gray-900 mb-1">In-Person Visit</h4><p className="text-sm text-gray-600">Visit a provider at their office</p>
                                                    </button>
                                                    <button className="p-6 border-2 border-gray-200 rounded-xl hover:border-purple-500 hover:bg-purple-50 transition-all text-left">
                                                        <div className="flex items-start justify-between mb-3"><i data-lucide="phone" className="w-8 h-8 text-purple-600"></i><span className="text-2xl font-bold text-gray-900">$10</span></div>
                                                        <h4 className="font-semibold text-gray-900 mb-1">Virtual Visit</h4><p className="text-sm text-gray-600">Video call with a provider</p><p className="text-xs text-gray-500 mt-2">Available 24/7</p>
                                                    </button>
                                                </div>
                                            </div>
                                        )}
                                        {bookingStep === 'providers' && (
                                            <div>
                                                <h3 className="font-semibold text-gray-900 mb-4">Choose a Provider</h3>
                                                <div className="space-y-4">
                                                    {nearbyProviders.map((provider, index) => (
                                                        <div key={index} className="border rounded-xl p-4 hover:border-blue-500 hover:shadow-md transition-all cursor-pointer" onClick={() => setBookingStep('confirm')}>
                                                            <div className="flex items-start justify-between mb-3"><div><h4 className="font-semibold text-gray-900">{provider.name}</h4><p className="text-sm text-gray-600">{provider.practice}</p></div><div className="text-right"><div className="flex items-center gap-1 text-sm"><i data-lucide="star" className="w-4 h-4 text-yellow-500"></i><span className="font-medium">{provider.rating}</span></div><p className="text-xs text-gray-500">{provider.patientCount}</p></div></div>
                                                            <div className="grid grid-cols-2 gap-4 text-sm"><div className="flex items-center gap-2 text-gray-600"><i data-lucide="map-pin" className="w-4 h-4"></i><span>{provider.distance}</span></div><div className="flex items-center gap-2 text-gray-600"><i data-lucide="clock" className="w-4 h-4"></i><span className="text-green-600 font-medium">{provider.nextAvailable}</span></div></div>
                                                            <div className="mt-3 pt-3 border-t flex items-center gap-4 text-xs text-gray-500"><span>Languages: {provider.languages.join(', ')}</span>{provider.acceptingNew ? <span className="text-green-600 font-medium">Accepting new patients</span> : <span className="text-red-600 font-medium">Not accepting new patients</span>}</div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                        {bookingStep === 'confirm' && (
                                            <div>
                                                <div className="text-center mb-6"><div className="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4"><i data-lucide="check-circle" className="w-8 h-8 text-green-600"></i></div><h3 className="text-xl font-bold text-gray-900 mb-2">Appointment Confirmed!</h3><p className="text-gray-600">We've sent confirmation details to your email</p></div>
                                                <div className="bg-gray-50 rounded-xl p-6 mb-6"><h4 className="font-semibold text-gray-900 mb-4">Appointment Details</h4><div className="space-y-3 text-sm">{[['Provider','Dr. Sarah Johnson, MD'],['Date & Time','Tomorrow, 2:30 PM'],['Location','Houston Medical Associates'],['Estimated Cost', selectedService && selectedService.cost]].map(([label,val],i)=>(<div key={i} className="flex justify-between"><span className="text-gray-600">{label}</span><span className={`font-medium ${label==='Estimated Cost'?'text-green-600':''}`}>{val}</span></div>))}</div></div>
                                                <div className="grid grid-cols-2 gap-4"><button className="px-4 py-3 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition-colors font-medium">Add to Calendar</button><button onClick={() => setShowBookingModal(false)} className="px-4 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-medium">Done</button></div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        <section className="px-4 sm:px-6 lg:px-8 pb-12">
                            <div className="max-w-7xl mx-auto">
                                <div className="bg-amber-50 border border-amber-200 rounded-lg p-6">
                                    <h3 className="font-semibold text-amber-900 mb-2">Important Information</h3>
                                    <ul className="text-sm text-amber-800 space-y-1">
                                        <li>• This is a summary based on typical {planData.carrier} plans. Your specific benefits may vary.</li>
                                        <li>• Always verify coverage with your insurance company before receiving care.</li>
                                        <li>• Costs shown are for in-network providers only.</li>
                                        {isHSA && <li>• With an HSA plan, you pay the full negotiated rate until you meet your deductible.</li>}
                                        <li>• Preventive care services are covered at 100% with no deductible.</li>
                                        <li>• Prior authorization may be required for certain services.</li>
                                    </ul>
                                </div>
                            </div>
                        </section>
                    </div>
                );
            };

            return (
                <div>
                    {showManualEntry && <ManualEntryModal />}
                    <NavigationBar />
                    {currentPage === 'home'     && <HomePage />}
                    {currentPage === 'benefits' && <BenefitsPage />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CareNavComplete />);
    </script>
</body>
</html>
