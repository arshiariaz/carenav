<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareNav Health - Healthcare Navigation Platform</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .animate-fadeIn {
            animation: fadeIn 0.5s ease-in-out;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .transform {
            transform: translateZ(0);
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useCallback, useEffect } = React;
        const { Shield, DollarSign, CreditCard, Users, Calendar, FileText, CheckCircle, XCircle, 
                AlertCircle, ChevronRight, Heart, Stethoscope, Brain, Eye, Baby, Pill, Phone, 
                Download, Share2, HelpCircle, TrendingUp, Clock, Star, Info, MapPin, X, 
                ChevronDown, Activity, Navigation, ChevronLeft, Upload, Search, Sparkles, 
                Filter, Building2, ArrowRight, Home, Menu } = lucide;

        function CareNavComplete() {
            const [currentPage, setCurrentPage] = useState('home');
            const [insuranceData, setInsuranceData] = useState(null);
            const [matchedPlan, setMatchedPlan] = useState(null);
            const [symptomData, setSymptomData] = useState(null);
            const [selectedProviders, setSelectedProviders] = useState([]);
            const [isUploading, setIsUploading] = useState(false);
            const [userLocation, setUserLocation] = useState({
                city: 'Houston',
                state: 'TX',
                zip: '77001'
            });

            // Initialize Lucide icons
            useEffect(() => {
                lucide.createIcons();
            }, [currentPage, isUploading]);

            // Simulate insurance upload and plan matching
            const handleInsuranceUpload = useCallback(() => {
                setIsUploading(true);
                
                // Simulate processing
                setTimeout(() => {
                    const extractedData = {
                        companyName: 'Anthem',
                        memberId: 'ANT123456789',
                        groupNumber: 'GRP174227M3A1',
                        payerId: 'ANTHEM'
                    };
                    
                    const planData = {
                        id: 'anthem-ppo-gold',
                        name: 'Anthem PPO Gold',
                        carrier: 'Anthem',
                        type: 'PPO',
                        summary: 'PPO plan with $1500 deductible, 80% coinsurance, wide national network',
                        deductible: 1500,
                        deductibleFamily: 3000,
                        oopMax: 7500,
                        oopMaxFamily: 15000,
                        copays: {
                            primaryCare: 30,
                            specialist: 60,
                            urgentCare: 75,
                            emergency: 350,
                            generic: 10
                        },
                        features: {
                            referralRequired: false,
                            outOfNetworkCovered: true,
                            networkSize: 'National',
                            telehealth: true
                        }
                    };
                    
                    setInsuranceData(extractedData);
                    setMatchedPlan(planData);
                    setIsUploading(false);
                }, 2000);
            }, []);

            // Navigation Component
            const NavigationBar = () => (
                <header className="bg-white/80 backdrop-blur-md shadow-sm sticky top-0 z-50 border-b border-gray-100">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="flex items-center justify-between h-16">
                            <div className="flex items-center gap-6">
                                <div 
                                    className="flex items-center gap-2 cursor-pointer"
                                    onClick={() => setCurrentPage('home')}
                                >
                                    <div className="w-8 h-8 bg-gradient-to-br from-blue-500 to-purple-600 rounded-lg flex items-center justify-center">
                                        <i data-lucide="heart" className="w-5 h-5 text-white"></i>
                                    </div>
                                    <span className="text-xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">
                                        CareNav
                                    </span>
                                </div>
                                
                                <nav className="hidden md:flex items-center gap-6">
                                    <button 
                                        onClick={() => setCurrentPage('home')}
                                        className={`text-sm font-medium transition-colors ${
                                            currentPage === 'home' ? 'text-blue-600' : 'text-gray-600 hover:text-gray-900'
                                        }`}
                                    >
                                        Find Care
                                    </button>
                                    {insuranceData && (
                                        <button 
                                            onClick={() => setCurrentPage('benefits')}
                                            className={`text-sm font-medium transition-colors flex items-center gap-1 ${
                                                currentPage === 'benefits' ? 'text-blue-600' : 'text-gray-600 hover:text-gray-900'
                                            }`}
                                        >
                                            My Benefits
                                            <span className="ml-1 px-2 py-0.5 bg-green-100 text-green-700 text-xs rounded-full">
                                                Active
                                            </span>
                                        </button>
                                    )}
                                    <button className="text-sm font-medium text-gray-600 hover:text-gray-900 transition-colors">
                                        Claims
                                    </button>
                                    <button className="text-sm font-medium text-gray-600 hover:text-gray-900 transition-colors">
                                        Help
                                    </button>
                                </nav>
                            </div>
                            
                            <div className="flex items-center gap-4">
                                {insuranceData && (
                                    <div className="hidden md:flex items-center gap-3 px-4 py-2 bg-gray-50 rounded-lg">
                                        <i data-lucide="shield" className="w-4 h-4 text-gray-600"></i>
                                        <div className="text-right">
                                            <p className="text-xs text-gray-500">Your Plan</p>
                                            <p className="text-sm font-medium text-gray-900">{matchedPlan?.name}</p>
                                        </div>
                                    </div>
                                )}
                                <button className="md:hidden p-2">
                                    <i data-lucide="menu" className="w-5 h-5 text-gray-600"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </header>
            );

            // Home Page Component
            const HomePage = () => {
                const [symptom, setSymptom] = useState('');
                const [showProviders, setShowProviders] = useState(false);
                const [providerFilter, setProviderFilter] = useState('all');

                const handleSymptomSubmit = (symptomText) => {
                    setSymptom(symptomText);
                    setSymptomData({
                        symptom: symptomText,
                        urgency: 'urgent',
                        recommendedCare: 'Urgent Care',
                        estimatedCost: '$75-150',
                        cptCodes: [
                            { code: '99213', description: 'Office visit' },
                            { code: '87880', description: 'Strep test' }
                        ]
                    });
                    setShowProviders(true);
                };

                const providers = [
                    {
                        name: 'NextCare Urgent Care',
                        type: 'Urgent Care',
                        address: '1234 Main St, Houston, TX 77002',
                        phone: '(713) 555-0123',
                        distance: 0.8,
                        driveTime: 8,
                        waitTime: '~30 min',
                        hours: 'Open until 8 PM',
                        estimatedPatientCost: 75,
                        negotiatedRate: 180,
                        insurancePays: 105,
                        networkStatus: 'In-Network',
                        rating: 4.6,
                        hasPharmacy: true
                    },
                    {
                        name: 'Memorial Hermann Urgent Care',
                        type: 'Urgent Care',
                        address: '5678 Medical Plaza, Houston, TX 77004',
                        phone: '(713) 555-0456',
                        distance: 2.3,
                        driveTime: 15,
                        waitTime: '~45 min',
                        hours: 'Open 24/7',
                        estimatedPatientCost: 75,
                        negotiatedRate: 195,
                        insurancePays: 120,
                        networkStatus: 'In-Network',
                        rating: 4.8,
                        hasPharmacy: false
                    },
                    {
                        name: 'St. Luke\'s Emergency Room',
                        type: 'Emergency Room',
                        address: '9012 Hospital Way, Houston, TX 77030',
                        phone: '(713) 555-0789',
                        distance: 3.5,
                        driveTime: 18,
                        waitTime: '2-4 hours',
                        hours: 'Open 24/7',
                        estimatedPatientCost: 350,
                        negotiatedRate: 2400,
                        insurancePays: 2050,
                        networkStatus: 'In-Network',
                        rating: 4.3,
                        hasPharmacy: true
                    }
                ];

                const filteredProviders = providerFilter === 'all' 
                    ? providers 
                    : providers.filter(p => p.type === providerFilter);

                return (
                    <div className="min-h-screen bg-gradient-to-br from-blue-50 via-white to-purple-50">
                        {/* Hero Section */}
                        <section className="pt-16 pb-8 px-4 sm:px-6 lg:px-8">
                            <div className="max-w-7xl mx-auto">
                                {/* Welcome Back Section for Returning Users */}
                                {insuranceData && (
                                    <div className="mb-8 p-6 bg-white rounded-xl shadow-md">
                                        <div className="flex items-center justify-between">
                                            <div>
                                                <h2 className="text-xl font-semibold text-gray-900 mb-1">Welcome back!</h2>
                                                <p className="text-gray-600">You're covered by {insuranceData.companyName} {matchedPlan?.name}</p>
                                            </div>
                                            <button 
                                                onClick={() => setCurrentPage('benefits')}
                                                className="flex items-center gap-2 text-blue-600 hover:text-blue-700 font-medium"
                                            >
                                                View Full Benefits <i data-lucide="arrow-right" className="w-4 h-4"></i>
                                            </button>
                                        </div>
                                        
                                        {/* Quick Stats */}
                                        <div className="grid grid-cols-3 gap-4 mt-6">
                                            <div className="text-center">
                                                <p className="text-2xl font-bold text-gray-900">$1,050</p>
                                                <p className="text-sm text-gray-600">Deductible remaining</p>
                                            </div>
                                            <div className="text-center">
                                                <p className="text-2xl font-bold text-green-600">$30</p>
                                                <p className="text-sm text-gray-600">PCP copay</p>
                                            </div>
                                            <div className="text-center">
                                                <p className="text-2xl font-bold text-blue-600">$75</p>
                                                <p className="text-sm text-gray-600">Urgent care copay</p>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                <div className="text-center mb-12">
                                    <h1 className="text-4xl sm:text-5xl font-bold text-gray-900 mb-4">
                                        {insuranceData ? 'How can we help today?' : 'Healthcare costs, '}
                                        {!insuranceData && <span className="bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">simplified</span>}
                                    </h1>
                                    <p className="text-xl text-gray-600 max-w-2xl mx-auto">
                                        {insuranceData 
                                            ? 'Find the right care at the right price with your Anthem coverage'
                                            : 'Know what you\'ll pay before you go. Upload your insurance card and find affordable care.'}
                                    </p>
                                </div>

                                {/* Main Action Area */}
                                {!insuranceData ? (
                                    // First Time User - Insurance Upload
                                    <div className="max-w-2xl mx-auto bg-white rounded-2xl shadow-xl p-8">
                                        <div className="text-center mb-6">
                                            <div className="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
                                                <i data-lucide="shield" className="w-8 h-8 text-blue-600"></i>
                                            </div>
                                            <h2 className="text-2xl font-bold text-gray-900 mb-2">Let's start with your insurance</h2>
                                            <p className="text-gray-600">Upload a photo of your insurance card to see your benefits</p>
                                        </div>
                                        
                                        <div 
                                            onClick={handleInsuranceUpload}
                                            className={`border-2 border-dashed border-gray-300 rounded-xl p-12 text-center cursor-pointer hover:border-blue-500 hover:bg-blue-50 transition-all duration-200 group ${
                                                isUploading ? 'pointer-events-none' : ''
                                            }`}
                                        >
                                            {isUploading ? (
                                                <>
                                                    <div className="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                                                    <p className="text-lg font-medium text-gray-700">Processing your insurance card...</p>
                                                    <p className="text-sm text-gray-500 mt-2">This will just take a moment</p>
                                                </>
                                            ) : (
                                                <>
                                                    <i data-lucide="upload" className="w-12 h-12 text-gray-400 mx-auto mb-4 group-hover:text-blue-500 transition-colors"></i>
                                                    <p className="text-lg font-medium text-gray-700 mb-2">Drop your insurance card here</p>
                                                    <p className="text-sm text-gray-500">or click to browse</p>
                                                </>
                                            )}
                                        </div>

                                        <div className="mt-6 text-center">
                                            <p className="text-xs text-gray-500 mb-2">Don't have your card handy?</p>
                                            <button className="text-blue-600 hover:text-blue-700 text-sm font-medium">
                                                Enter information manually →
                                            </button>
                                        </div>
                                    </div>
                                ) : (
                                    // Returning User - Symptom Checker
                                    <div className="max-w-2xl mx-auto">
                                        <div className="bg-white rounded-2xl shadow-xl p-8">
                                            <div className="text-center mb-6">
                                                <div className="w-16 h-16 bg-purple-100 rounded-full flex items-center justify-center mx-auto mb-4">
                                                    <i data-lucide="activity" className="w-8 h-8 text-purple-600"></i>
                                                </div>
                                                <h2 className="text-2xl font-bold text-gray-900 mb-2">What brings you in today?</h2>
                                                <p className="text-gray-600">Describe your symptoms and we'll find the right care</p>
                                            </div>

                                            <div className="space-y-4">
                                                <div className="relative">
                                                    <input
                                                        type="text"
                                                        placeholder="e.g., sore throat and fever for 2 days"
                                                        value={symptom}
                                                        onChange={(e) => setSymptom(e.target.value)}
                                                        className="w-full px-4 py-3 pr-12 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all"
                                                        onKeyPress={(e) => {
                                                            if (e.key === 'Enter' && e.target.value) {
                                                                handleSymptomSubmit(e.target.value);
                                                            }
                                                        }}
                                                    />
                                                    <i data-lucide="sparkles" className="absolute right-4 top-3.5 w-5 h-5 text-gray-400"></i>
                                                </div>

                                                <div className="flex flex-wrap gap-2">
                                                    <span className="text-sm text-gray-500">Common symptoms:</span>
                                                    {['Flu symptoms', 'Sore throat', 'Sprained ankle', 'Chest pain'].map((s) => (
                                                        <button
                                                            key={s}
                                                            onClick={() => handleSymptomSubmit(s)}
                                                            className="px-3 py-1 bg-gray-100 hover:bg-gray-200 rounded-full text-sm text-gray-700 transition-colors"
                                                        >
                                                            {s}
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>

                                        {/* Quick Actions for Returning Users */}
                                        <div className="grid grid-cols-2 gap-4 mt-6">
                                            <button 
                                                onClick={() => setCurrentPage('benefits')}
                                                className="p-6 bg-white rounded-xl shadow-md hover:shadow-lg transition-all text-left group"
                                            >
                                                <i data-lucide="credit-card" className="w-8 h-8 text-blue-600 mb-3"></i>
                                                <h3 className="font-semibold text-gray-900 mb-1">Check Coverage</h3>
                                                <p className="text-sm text-gray-600">See what's covered by your plan</p>
                                                <p className="text-xs text-blue-600 mt-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                                    View benefits →
                                                </p>
                                            </button>
                                            
                                            <button 
                                                onClick={() => setShowProviders(true)}
                                                className="p-6 bg-white rounded-xl shadow-md hover:shadow-lg transition-all text-left group"
                                            >
                                                <i data-lucide="map-pin" className="w-8 h-8 text-purple-600 mb-3"></i>
                                                <h3 className="font-semibold text-gray-900 mb-1">Find Providers</h3>
                                                <p className="text-sm text-gray-600">Browse in-network doctors</p>
                                                <p className="text-xs text-purple-600 mt-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                                    Search now →
                                                </p>
                                            </button>
                                        </div>
                                    </div>
                                )}

                                {/* Results Section */}
                                {symptomData && showProviders && (
                                    <div className="mt-8 space-y-6 animate-fadeIn">
                                        <div className="bg-gradient-to-r from-orange-50 to-amber-50 border border-orange-200 rounded-xl p-6">
                                            <div className="flex items-start gap-4">
                                                <i data-lucide="alert-circle" className="w-6 h-6 text-orange-600 flex-shrink-0 mt-0.5"></i>
                                                <div className="flex-1">
                                                    <h3 className="font-semibold text-gray-900 mb-1">Urgent Care Recommended</h3>
                                                    <p className="text-sm text-gray-700 mb-3">
                                                        Based on your symptoms, we recommend visiting an urgent care facility. Estimated cost with your plan: $75 copay.
                                                    </p>
                                                    <div className="flex gap-4">
                                                        <button 
                                                            onClick={() => setCurrentPage('benefits')}
                                                            className="text-sm text-blue-600 hover:text-blue-700 font-medium"
                                                        >
                                                            Check full coverage details →
                                                        </button>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                        {/* Provider Results */}
                                        <div className="bg-white rounded-xl shadow-lg p-6">
                                            <div className="flex items-center justify-between mb-4">
                                                <h3 className="text-lg font-semibold text-gray-900">Nearby Providers</h3>
                                                <div className="flex items-center gap-2">
                                                    <i data-lucide="filter" className="w-4 h-4 text-gray-500"></i>
                                                    <select 
                                                        value={providerFilter}
                                                        onChange={(e) => setProviderFilter(e.target.value)}
                                                        className="text-sm border border-gray-300 rounded-md px-3 py-1 focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                                                    >
                                                        <option value="all">All Providers</option>
                                                        <option value="Urgent Care">Urgent Care</option>
                                                        <option value="Emergency Room">Emergency Room</option>
                                                    </select>
                                                </div>
                                            </div>

                                            <div className="space-y-4">
                                                {filteredProviders.map((provider, index) => (
                                                    <div key={index} className="border rounded-lg p-4 hover:border-blue-500 transition-colors">
                                                        <div className="flex items-start justify-between mb-3">
                                                            <div>
                                                                <div className="flex items-center gap-2 mb-1">
                                                                    <h4 className="font-medium text-gray-900">{provider.name}</h4>
                                                                    {provider.networkStatus === 'In-Network' && (
                                                                        <span className="px-2 py-0.5 bg-green-100 text-green-700 text-xs rounded-full">
                                                                            In-Network
                                                                        </span>
                                                                    )}
                                                                </div>
                                                                <p className="text-sm text-gray-600">{provider.distance} mi • {provider.waitTime}</p>
                                                            </div>
                                                            <div className="text-right">
                                                                <p className="text-xl font-bold text-gray-900">${provider.estimatedPatientCost}</p>
                                                                <p className="text-xs text-gray-600">Your copay</p>
                                                            </div>
                                                        </div>

                                                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4 text-sm mb-3">
                                                            <div>
                                                                <p className="text-gray-500">Hours</p>
                                                                <p className="font-medium">{provider.hours}</p>
                                                            </div>
                                                            <div>
                                                                <p className="text-gray-500">Rating</p>
                                                                <div className="flex items-center gap-1">
                                                                    <i data-lucide="star" className="w-4 h-4 text-yellow-500 fill-current"></i>
                                                                    <span className="font-medium">{provider.rating}</span>
                                                                </div>
                                                            </div>
                                                            <div>
                                                                <p className="text-gray-500">Total Cost</p>
                                                                <p className="font-medium">${provider.negotiatedRate}</p>
                                                            </div>
                                                            <div>
                                                                <p className="text-gray-500">Insurance Pays</p>
                                                                <p className="font-medium text-green-600">${provider.insurancePays}</p>
                                                            </div>
                                                        </div>

                                                        <div className="flex items-center gap-3">
                                                            <button className="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-medium">
                                                                Book Now
                                                            </button>
                                                            <button className="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">
                                                                <i data-lucide="phone" className="w-5 h-5 text-gray-600"></i>
                                                            </button>
                                                            <button className="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">
                                                                <i data-lucide="navigation" className="w-5 h-5 text-gray-600"></i>
                                                            </button>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>

                                            <div className="mt-6 p-4 bg-blue-50 rounded-lg">
                                                <p className="text-sm text-blue-800">
                                                    💡 <strong>Tip:</strong> Call ahead to confirm wait times and let them know you're coming. 
                                                    Have your insurance card and ID ready.
                                                </p>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </section>
                    </div>
                );
            };

            // Benefits Page Component
            const BenefitsPage = () => {
                const [activeTab, setActiveTab] = useState('overview');
                const [showBookingModal, setShowBookingModal] = useState(false);
                const [selectedService, setSelectedService] = useState(null);
                const [bookingStep, setBookingStep] = useState('select');

                // Use the matched plan data or default
                const planData = matchedPlan ? {
                    carrier: matchedPlan.carrier,
                    plan_name: matchedPlan.name,
                    plan_type: matchedPlan.type,
                    deductible_individual: matchedPlan.deductible,
                    deductible_family: matchedPlan.deductibleFamily,
                    deductibleMet: 450,
                    oop_max_individual: matchedPlan.oopMax,
                    oop_max_family: matchedPlan.oopMaxFamily,
                    oopMet: 1200,
                    coinsurance: 20,
                    copays: matchedPlan.copays,
                    features: {
                        ...matchedPlan.features,
                        groupNumber: insuranceData?.groupNumber,
                        payerId: insuranceData?.payerId
                    }
                } : null;

                if (!planData) {
                    return (
                        <div className="min-h-screen bg-gradient-to-br from-blue-50 via-white to-purple-50 flex items-center justify-center">
                            <div className="text-center">
                                <i data-lucide="shield" className="w-16 h-16 text-gray-400 mx-auto mb-4"></i>
                                <h2 className="text-2xl font-bold text-gray-900 mb-2">No Plan Data Available</h2>
                                <p className="text-gray-600 mb-4">Upload your insurance card to see your benefits.</p>
                                <button 
                                    onClick={() => setCurrentPage('home')}
                                    className="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-medium"
                                >
                                    Go to Home
                                </button>
                            </div>
                        </div>
                    );
                }

                const specialists = [
                    { 
                        type: 'Cardiologist', 
                        icon: 'heart', 
                        copay: 60, 
                        referralRequired: false,
                        waitTime: '2-3 weeks',
                        inNetworkCount: 145,
                        commonProcedures: ['EKG', 'Stress Test', 'Echocardiogram']
                    },
                    { 
                        type: 'Dermatologist', 
                        icon: 'shield', 
                        copay: 60, 
                        referralRequired: false,
                        waitTime: '3-4 weeks',
                        inNetworkCount: 89,
                        commonProcedures: ['Skin Biopsy', 'Acne Treatment', 'Mole Removal']
                    },
                    { 
                        type: 'Orthopedist', 
                        icon: 'stethoscope', 
                        copay: 60, 
                        referralRequired: false,
                        waitTime: '1-2 weeks',
                        inNetworkCount: 234,
                        commonProcedures: ['X-ray', 'Joint Injection', 'Physical Therapy']

                                                        <div className="flex flex-wrap gap-2">
                                                            {tier.examples.map((med, i) => (
                                                                <span key={i} className="px-2 py-1 bg-gray-100 rounded text-sm text-gray-700">
                                                                    {med}
                                                                </span>
                                                            ))}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            <div className="bg-blue-50 rounded-xl p-6 border border-blue-200">
                                                <h3 className="font-semibold text-gray-900 mb-3">Mail Order Pharmacy</h3>
                                                <p className="text-sm text-gray-700 mb-3">Save money on maintenance medications with 90-day supplies</p>
                                                <ul className="space-y-2 text-sm">
                                                    <li className="flex items-center gap-2">
                                                        <i data-lucide="check-circle" className="w-4 h-4 text-green-500"></i>
                                                        <span>2.5x copay for 3-month supply</span>
                                                    </li>
                                                    <li className="flex items-center gap-2">
                                                        <i data-lucide="check-circle" className="w-4 h-4 text-green-500"></i>
                                                        <span>Free home delivery</span>
                                                    </li>
                                                    <li className="flex items-center gap-2">
                                                        <i data-lucide="check-circle" className="w-4 h-4 text-green-500"></i>
                                                        <span>Automatic refills available</span>
                                                    </li>
                                                </ul>
                                            </div>

                                            <div className="bg-purple-50 rounded-xl p-6 border border-purple-200">
                                                <h3 className="font-semibold text-gray-900 mb-3">Specialty Pharmacy</h3>
                                                <p className="text-sm text-gray-700 mb-3">For complex conditions requiring special handling</p>
                                                <ul className="space-y-2 text-sm">
                                                    <li className="flex items-center gap-2">
                                                        <i data-lucide="alert-circle" className="w-4 h-4 text-orange-500"></i>
                                                        <span>Prior authorization required</span>
                                                    </li>
                                                    <li className="flex items-center gap-2">
                                                        <i data-lucide="check-circle" className="w-4 h-4 text-green-500"></i>
                                                        <span>Clinical support included</span>
                                                    </li>
                                                    <li className="flex items-center gap-2">
                                                        <i data-lucide="check-circle" className="w-4 h-4 text-green-500"></i>
                                                        <span>Financial assistance available</span>
                                                    </li>
                                                </ul>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {/* Preventive Care Tab */}
                                {activeTab === 'preventive' && (
                                    <div className="space-y-6">
                                        <div className="bg-white rounded-xl shadow-lg p-6">
                                            <h2 className="text-xl font-bold text-gray-900 mb-2">100% Covered Preventive Care</h2>
                                            <p className="text-gray-600 mb-6">These services are free when you use in-network providers. No copay, no deductible.</p>
                                            
                                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                                <div>
                                                    <h3 className="font-semibold text-gray-900 mb-3 flex items-center gap-2">
                                                        <i data-lucide="users" className="w-5 h-5 text-blue-600"></i>
                                                        Adults
                                                    </h3>
                                                    <ul className="space-y-2">
                                                        {preventiveCare.adults.map((item, index) => (
                                                            <li 
                                                                key={index} 
                                                                className="flex items-start gap-2 cursor-pointer hover:bg-gray-50 -mx-2 px-2 py-1 rounded transition-colors"
                                                                onClick={() => handleServiceClick({ service: item, cost: '$0', status: '100% covered', preventive: true })}
                                                            >
                                                                <i data-lucide="check-circle" className="w-4 h-4 text-green-500 flex-shrink-0 mt-0.5"></i>
                                                                <span className="text-sm text-gray-700 flex-1">{item}</span>
                                                                <i data-lucide="chevron-right" className="w-4 h-4 text-gray-400"></i>
                                                            </li>
                                                        ))}
                                                    </ul>
                                                </div>
                                                
                                                <div>
                                                    <h3 className="font-semibold text-gray-900 mb-3 flex items-center gap-2">
                                                        <i data-lucide="baby" className="w-5 h-5 text-purple-600"></i>
                                                        Children
                                                    </h3>
                                                    <ul className="space-y-2">
                                                        {preventiveCare.children.map((item, index) => (
                                                            <li 
                                                                key={index} 
                                                                className="flex items-start gap-2 cursor-pointer hover:bg-gray-50 -mx-2 px-2 py-1 rounded transition-colors"
                                                                onClick={() => handleServiceClick({ service: item, cost: '$0', status: '100% covered', preventive: true })}
                                                            >
                                                                <i data-lucide="check-circle" className="w-4 h-4 text-green-500 flex-shrink-0 mt-0.5"></i>
                                                                <span className="text-sm text-gray-700 flex-1">{item}</span>
                                                                <i data-lucide="chevron-right" className="w-4 h-4 text-gray-400"></i>
                                                            </li>
                                                        ))}
                                                    </ul>
                                                </div>

                                                <div>
                                                    <h3 className="font-semibold text-gray-900 mb-3 flex items-center gap-2">
                                                        <i data-lucide="heart" className="w-5 h-5 text-pink-600"></i>
                                                        Women
                                                    </h3>
                                                    <ul className="space-y-2">
                                                        {preventiveCare.women.map((item, index) => (
                                                            <li 
                                                                key={index} 
                                                                className="flex items-start gap-2 cursor-pointer hover:bg-gray-50 -mx-2 px-2 py-1 rounded transition-colors"
                                                                onClick={() => handleServiceClick({ service: item, cost: '$0', status: '100% covered', preventive: true })}
                                                            >
                                                                <i data-lucide="check-circle" className="w-4 h-4 text-green-500 flex-shrink-0 mt-0.5"></i>
                                                                <span className="text-sm text-gray-700 flex-1">{item}</span>
                                                                <i data-lucide="chevron-right" className="w-4 h-4 text-gray-400"></i>
                                                            </li>
                                                        ))}
                                                    </ul>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="bg-green-50 rounded-xl p-6 border border-green-200">
                                            <h3 className="font-semibold text-gray-900 mb-3">💡 Preventive Care Tips</h3>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
                                                <div>
                                                    <h4 className="font-medium text-gray-900 mb-1">Schedule Early</h4>
                                                    <p className="text-gray-700">Book annual exams at the start of the year to ensure you get your preventive care</p>
                                                </div>
                                                <div>
                                                    <h4 className="font-medium text-gray-900 mb-1">Stay In-Network</h4>
                                                    <p className="text-gray-700">Preventive care is only free when you use in-network providers</p>
                                                </div>
                                                <div>
                                                    <h4 className="font-medium text-gray-900 mb-1">Know Your Age</h4>
                                                    <p className="text-gray-700">Some screenings are covered based on age (e.g., colonoscopy at 45+)</p>
                                                </div>
                                                <div>
                                                    <h4 className="font-medium text-gray-900 mb-1">Ask Questions</h4>
                                                    <p className="text-gray-700">Confirm services are coded as preventive to avoid unexpected bills</p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </section>

                        {/* Booking Modal */}
                        {showBookingModal && (
                            <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
                                <div className="bg-white rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-hidden">
                                    <div className="bg-gradient-to-r from-blue-600 to-purple-600 p-6 text-white">
                                        <div className="flex items-center justify-between">
                                            <div>
                                                <h2 className="text-2xl font-bold">Book {selectedService?.service}</h2>
                                                <p className="text-blue-100 mt-1">
                                                    Estimated cost: {selectedService?.cost} {selectedService?.preventive && '(Free - Preventive Care)'}
                                                </p>
                                            </div>
                                            <button 
                                                onClick={() => setShowBookingModal(false)}
                                                className="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center hover:bg-white/30 transition-colors"
                                            >
                                                <i data-lucide="x" className="w-6 h-6"></i>
                                            </button>
                                        </div>
                                    </div>

                                    <div className="p-6 overflow-y-auto max-h-[calc(90vh-120px)]">
                                        {bookingStep === 'select' && (
                                            <div>
                                                <h3 className="font-semibold text-gray-900 mb-4">How would you like to receive care?</h3>
                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                    <button 
                                                        onClick={() => setBookingStep('providers')}
                                                        className="p-6 border-2 border-gray-200 rounded-xl hover:border-blue-500 hover:bg-blue-50 transition-all text-left group"
                                                    >
                                                        <div className="flex items-start justify-between mb-3">
                                                            <i data-lucide="stethoscope" className="w-8 h-8 text-blue-600"></i>
                                                            <span className="text-2xl font-bold text-gray-900">{selectedService?.cost}</span>
                                                        </div>
                                                        <h4 className="font-semibold text-gray-900 mb-1">In-Person Visit</h4>
                                                        <p className="text-sm text-gray-600">Visit a provider at their office</p>
                                                        {selectedService?.waitTime && (
                                                            <p className="text-xs text-gray-500 mt-2">Typical wait: {selectedService.waitTime}</p>
                                                        )}
                                                    </button>
                                                    
                                                    <button 
                                                        className="p-6 border-2 border-gray-200 rounded-xl hover:border-purple-500 hover:bg-purple-50 transition-all text-left group"
                                                    >
                                                        <div className="flex items-start justify-between mb-3">
                                                            <i data-lucide="phone" className="w-8 h-8 text-purple-600"></i>
                                                            <span className="text-2xl font-bold text-gray-900">$10</span>
                                                        </div>
                                                        <h4 className="font-semibold text-gray-900 mb-1">Virtual Visit</h4>
                                                        <p className="text-sm text-gray-600">Video call with a provider</p>
                                                        <p className="text-xs text-gray-500 mt-2">Available 24/7</p>
                                                    </button>
                                                </div>

                                                {selectedService?.referralRequired && (
                                                    <div className="mt-6 p-4 bg-orange-50 border border-orange-200 rounded-lg">
                                                        <div className="flex items-start gap-3">
                                                            <i data-lucide="alert-circle" className="w-5 h-5 text-orange-600 flex-shrink-0 mt-0.5"></i>
                                                            <div>
                                                                <p className="font-medium text-gray-900">Referral Required</p>
                                                                <p className="text-sm text-gray-700 mt-1">
                                                                    You'll need a referral from your primary care doctor before seeing this specialist.
                                                                </p>
                                                            </div>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        )}

                                        {bookingStep === 'providers' && (
                                            <div>
                                                <h3 className="font-semibold text-gray-900 mb-4">Choose a Provider</h3>
                                                <div className="space-y-4">
                                                    {nearbyProviders.map((provider, index) => (
                                                        <div 
                                                            key={index}
                                                            className="border rounded-xl p-4 hover:border-blue-500 hover:shadow-md transition-all cursor-pointer"
                                                            onClick={() => setBookingStep('confirm')}
                                                        >
                                                            <div className="flex items-start justify-between mb-3">
                                                                <div>
                                                                    <h4 className="font-semibold text-gray-900">{provider.name}</h4>
                                                                    <p className="text-sm text-gray-600">{provider.practice}</p>
                                                                </div>
                                                                <div className="text-right">
                                                                    <div className="flex items-center gap-1 text-sm">
                                                                        <i data-lucide="star" className="w-4 h-4 text-yellow-500"></i>
                                                                        <span className="font-medium">{provider.rating}</span>
                                                                    </div>
                                                                    <p className="text-xs text-gray-500">{provider.patientCount}</p>
                                                                </div>
                                                            </div>
                                                            
                                                            <div className="grid grid-cols-2 gap-4 text-sm">
                                                                <div className="flex items-center gap-2 text-gray-600">
                                                                    <i data-lucide="map-pin" className="w-4 h-4"></i>
                                                                    <span>{provider.distance}</span>
                                                                </div>
                                                                <div className="flex items-center gap-2 text-gray-600">
                                                                    <i data-lucide="clock" className="w-4 h-4"></i>
                                                                    <span className="text-green-600 font-medium">{provider.nextAvailable}</span>
                                                                </div>
                                                            </div>

                                                            <div className="mt-3 pt-3 border-t flex items-center gap-4 text-xs text-gray-500">
                                                                <span>Languages: {provider.languages.join(', ')}</span>
                                                                {provider.acceptingNew ? (
                                                                    <span className="text-green-600 font-medium">Accepting new patients</span>
                                                                ) : (
                                                                    <span className="text-red-600 font-medium">Not accepting new patients</span>
                                                                )}
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}

                                        {bookingStep === 'confirm' && (
                                            <div>
                                                <div className="text-center mb-6">
                                                    <div className="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
                                                        <i data-lucide="check-circle" className="w-8 h-8 text-green-600"></i>
                                                    </div>
                                                    <h3 className="text-xl font-bold text-gray-900 mb-2">Appointment Confirmed!</h3>
                                                    <p className="text-gray-600">We've sent confirmation details to your email</p>
                                                </div>

                                                <div className="bg-gray-50 rounded-xl p-6 mb-6">
                                                    <h4 className="font-semibold text-gray-900 mb-4">Appointment Details</h4>
                                                    <div className="space-y-3 text-sm">
                                                        <div className="flex justify-between">
                                                            <span className="text-gray-600">Provider</span>
                                                            <span className="font-medium">Dr. Sarah Johnson, MD</span>
                                                        </div>
                                                        <div className="flex justify-between">
                                                            <span className="text-gray-600">Date & Time</span>
                                                            <span className="font-medium">Tomorrow, 2:30 PM</span>
                                                        </div>
                                                        <div className="flex justify-between">
                                                            <span className="text-gray-600">Location</span>
                                                            <span className="font-medium">Houston Medical Associates</span>
                                                        </div>
                                                        <div className="flex justify-between">
                                                            <span className="text-gray-600">Estimated Cost</span>
                                                            <span className="font-medium text-green-600">{selectedService?.cost}</span>
                                                        </div>
                                                    </div>
                                                </div>

                                                <div className="grid grid-cols-2 gap-4">
                                                    <button className="px-4 py-3 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition-colors font-medium">
                                                        Add to Calendar
                                                    </button>
                                                    <button 
                                                        onClick={() => setShowBookingModal(false)}
                                                        className="px-4 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-medium"
                                                    >
                                                        Done
                                                    </button>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Important Information Footer */}
                        <section className="px-4 sm:px-6 lg:px-8 pb-12">
                            <div className="max-w-7xl mx-auto">
                                <div className="bg-amber-50 border border-amber-200 rounded-lg p-6">
                                    <h3 className="font-semibold text-amber-900 mb-2">Important Information</h3>
                                    <ul className="text-sm text-amber-800 space-y-1">
                                        <li>• This is a summary based on typical {planData.carrier} plans. Your specific benefits may vary.</li>
                                        <li>• Always verify coverage with your insurance company before receiving care.</li>
                                        <li>• Costs shown are for in-network providers only.</li>
                                        {isHSA && <li>• With an HSA plan, you pay the full negotiated rate until you meet your deductible.</li>}
                                        <li>• Preventive care services are covered at 100% with no deductible.</li>
                                        <li>• Prior authorization may be required for certain services.</li>
                                    </ul>
                                </div>
                            </div>
                        </section>
                    </div>
                );
            };

            return (
                <div>
                    <NavigationBar />
                    {currentPage === 'home' && <HomePage />}
                    {currentPage === 'benefits' && <BenefitsPage />}
                </div>
            );
        }

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CareNavComplete />);
    </script>
</body>
</html>
